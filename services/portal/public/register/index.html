<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — UmbraSec</title>
    <link rel="icon" type="image/png" href="/CDN/images/favicon.png">
    <link rel="stylesheet" href="/static/shared.css">
</head>
<body>
    <div class="background"></div>
    <div class="auth-wrapper">
        <div class="container-narrow">
            <a href="https://umbrasec.one" class="brand" style="justify-content:center; margin-bottom:2rem; text-decoration:none;">Umbra<span>Security</span></a>
            <div class="glass-card">
                <h1>Create Account</h1>
                <p class="subtitle">Get access to encrypted VPN, drive, and mail</p>
                <div class="msg msg-error" id="error"></div>
                <form id="registerForm" method="POST" action="/register">
                    <input type="hidden" name="_csrf" id="csrf">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required minlength="12" autocomplete="new-password">
                    <p class="hint">Minimum 12 characters</p>
                    <label for="confirm">Confirm Password</label>
                    <input type="password" id="confirm" name="confirm" required minlength="12" autocomplete="new-password">
                    <button type="submit" class="btn btn-primary">Create Account</button>
                </form>
                <div class="form-link">
                    <a href="/register/anonymous">Anonymous signup (no email)</a>
                </div>
                <div class="form-link">
                    <a href="/login">Already have an account? Login</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/csrf', { credentials: 'same-origin' })
            .then(r => r.json())
            .then(data => { document.getElementById('csrf').value = data.csrfToken; })
            .catch(() => {});

        const redirectParam = new URLSearchParams(window.location.search).get('redirect');
        if (redirectParam) {
            const qs = '?redirect=' + encodeURIComponent(redirectParam);
            document.querySelector('a[href="/register/anonymous"]').href += qs;
            document.querySelector('a[href="/login"]').href += qs;
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const errEl = document.getElementById('error');
            errEl.style.display = 'none';
            if (document.getElementById('password').value !== document.getElementById('confirm').value) {
                errEl.textContent = 'Passwords do not match.';
                errEl.style.display = 'block';
                return;
            }

            const formData = new URLSearchParams(new FormData(form));
            if (redirectParam) formData.set('redirect', redirectParam);

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData,
                    credentials: 'same-origin',
                    redirect: 'follow',
                });
                if (!res.ok) {
                    errEl.textContent = await res.text();
                    errEl.style.display = 'block';
                } else {
                    const data = await res.json();
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    } else {
                        window.location.href = 'https://dashboard.umbrasec.one';
                    }
                }
            } catch (err) {
                errEl.textContent = 'Network error. Please try again.';
                errEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
